<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script type="importmap">
            {
                "imports": {
                    "temporal-polyfill": "https://cdn.jsdelivr.net/npm/temporal-polyfill@0.3.0/+esm"
                }
            }
        </script>

        <script type="module" src="script.mjs"></script>
        <title>Spaced Repetition Tracker</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <h1>Spaced Repetition Tracker</h1>
        </header>
        <main>
            <label for="user-select">Select a user: </label>
            <select name="user-select" id="user-select" autofocus>
                <option value="" disabled selected>SELECT A USER</option>
            </select>
            <!-- Aria label not strictly necessary -->
            <form id="topic-form" aria-labelledby="form-heading">
                <h2 id="form-heading">Add new topic</h2>
                <label for="topic-title">Topic: </label>
                <input
                    type="text"
                    id="topic-title"
                    name="topic-title"
                    minlength="1"
                    maxlength="100"
                    required />
                <label for="topic-date">Topic add date: </label>
                <input type="date" name="topic-date" id="topic-date" required />
                <button type="submit">Add topic</button>
            </form>
            <section id="topic-container" aria-label="topics list container">
                <h2 id="topic-section-status">No User is selected.</h2>
                <ul id="topics-ul"></ul>
            </section>
        </main>
    </body>
</html>
